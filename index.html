<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💒 Yashwanth ❤ Harika | Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root{
            --gold:#d4a853;
            --gold-light:#f0d48a;
            --gold-dark:#b8860b;
            --maroon:#800020;
            --maroon-deep:#5a0018;
            --cream:#fef9f0;
            --rose:#e8a0b4;
            --blush:#fff0f5;
            --dark:#1a0008;
        }

        html{scroll-behavior:smooth}

        body{
            font-family:'Cormorant Garamond',serif;
            background:var(--cream);
            color:#333;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }

        /* ========== PRELOADER ========== */
        #preloader{
            position:fixed;inset:0;
            background:linear-gradient(135deg,#1a0008,#3d0015,#1a0008);
            z-index:99999;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            transition:opacity 1s ease,visibility 1s ease;
        }
        #preloader.hide{opacity:0;visibility:hidden;pointer-events:none}

        .loader-ring{
            width:80px;height:80px;position:relative;
        }
        .loader-ring::before,.loader-ring::after{
            content:'';position:absolute;inset:0;
            border-radius:50%;
            border:3px solid transparent;
        }
        .loader-ring::before{
            border-top-color:var(--gold);border-bottom-color:var(--gold);
            animation:spin 1.2s linear infinite;
        }
        .loader-ring::after{
            inset:10px;
            border-left-color:var(--rose);border-right-color:var(--rose);
            animation:spin 0.8s linear infinite reverse;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        .loader-text{
            margin-top:25px;
            font-family:'Great Vibes',cursive;
            font-size:2rem;color:var(--gold);
            animation:fadeInOut 1.5s ease infinite;
        }
        @keyframes fadeInOut{0%,100%{opacity:.4}50%{opacity:1}}

        /* ========== ENVELOPE ========== */
        #envelope-screen{
            position:fixed;inset:0;
            background:linear-gradient(135deg,#0d0004,#2a000d,#0d0004);
            z-index:9999;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            transition:all 1.5s cubic-bezier(.4,0,.2,1);
        }
        #envelope-screen.opened{
            opacity:0;transform:scale(1.5);pointer-events:none;
        }

        .envelope-wrapper{
            position:relative;cursor:pointer;
            animation:float 3s ease-in-out infinite;
        }
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

        .envelope-box{
            width:320px;height:220px;
            background:linear-gradient(145deg,var(--gold-light),var(--gold),var(--gold-dark));
            border-radius:8px;position:relative;
            box-shadow:0 25px 60px rgba(0,0,0,.5);
            overflow:hidden;
        }

        .envelope-top{
            position:absolute;top:0;left:0;width:100%;
            height:110px;
            background:linear-gradient(145deg,var(--gold),var(--gold-dark));
            clip-path:polygon(0 0,50% 100%,100% 0);
            z-index:3;
            transform-origin:top center;
            transition:transform .8s ease;
        }
        .envelope-wrapper:hover .envelope-top{
            transform:rotateX(180deg);
        }

        .envelope-inner{
            position:absolute;top:30px;left:15%;width:70%;
            padding:20px;
            background:#fff;border-radius:4px;
            text-align:center;z-index:1;
            transition:transform .6s ease .3s;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
        }
        .envelope-wrapper:hover .envelope-inner{
            transform:translateY(-25px);
        }
        .envelope-inner p{
            font-family:'Great Vibes',cursive;
            color:var(--maroon);font-size:1rem;
            margin-bottom:5px;
        }
        .envelope-inner h3{
            font-family:'Great Vibes',cursive;
            color:var(--gold-dark);font-size:1.4rem;
        }

        .envelope-seal{
            position:absolute;bottom:20px;left:50%;
            transform:translateX(-50%);z-index:2;
            width:45px;height:45px;
            background:var(--maroon);border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            box-shadow:0 3px 10px rgba(0,0,0,.3);
        }
        .envelope-seal span{
            color:var(--gold);font-family:'Great Vibes',cursive;
            font-size:1.1rem;
        }

        .click-hint{
            margin-top:30px;
            color:var(--gold);
            font-family:'Poppins',sans-serif;
            font-size:.8rem;letter-spacing:3px;
            text-transform:uppercase;
            animation:fadeInOut 2s ease infinite;
        }

        /* ========== PARTICLES ========== */
        #particles{
            position:fixed;inset:0;
            pointer-events:none;z-index:200;
            overflow:hidden;
        }

        .ptcl{
            position:absolute;pointer-events:none;
            opacity:0;
        }
        .ptcl.petal{
            width:10px;height:10px;
            background:radial-gradient(ellipse,var(--rose),#c97088);
            border-radius:50% 0 50% 50%;
            animation:fall linear infinite;
        }
        .ptcl.sparkle{
            width:4px;height:4px;
            background:var(--gold);border-radius:50%;
            box-shadow:0 0 6px var(--gold);
            animation:fall linear infinite;
        }
        .ptcl.heart-p{
            font-size:12px;color:var(--rose);
            animation:fall linear infinite;
        }

        @keyframes fall{
            0%{transform:translateY(-5vh) rotate(0);opacity:0}
            10%{opacity:.8}
            90%{opacity:.5}
            100%{transform:translateY(105vh) rotate(720deg);opacity:0}
        }

        /* ========== MUSIC BUTTON ========== */
        #musicBtn{
            position:fixed;bottom:25px;right:25px;
            width:50px;height:50px;
            background:linear-gradient(135deg,var(--maroon),var(--maroon-deep));
            border:2px
